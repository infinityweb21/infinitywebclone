<section class="inf-hero-section"  [ngStyle]="{'background-image': 'url(' + backgroundImageUrl + ')'}">
  <div class="container">
    <div class="row justify-content-end align-items-center">
      <div class="col-lg-6 col-md-7">
        <div class="inf-hero-content">
          <h1>{{headerText}}</h1>
          <p>{{subHeaderText}}</p>
        </div>

        <div class="inf-call-widget">
          <h2>Purchase Best <span>Deals</span></h2>
          <form name="inf-call-form" action="#" method="post" novalidate [formGroup]="contactForm" >
            <div class="form-row">
                <div class="row g-2 g-lg-3">
                    <div class="col-md-6">
                        <input type="text" name="sub_name" placeholder="Your Name" class="form-control" required formControlName="name"  [class.is-invalid]="isInvalid('name')"/>
                         <div *ngIf="isInvalid('name')" class="text-danger">Name is required.</div>
                    </div>
                    <div class="col-md-6">
                        <input type="tel" name="sub_phone_number"  class="form-control" placeholder="Your Phone Number" required formControlName="phone"  [class.is-invalid]="isInvalid('phone')"/>
                         <div *ngIf="isInvalid('phone')" class="text-danger">Phone number is required.</div>
                         <div *ngIf="contactForm.get('phone')?.errors?.['pattern']">
      Please enter a valid phone number (6–15 digits).
    </div>
                    </div>
                </div>
              <button type="submit" class="banner-form-submit-btn" (click)="submitContactForm()">Get a Call</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
